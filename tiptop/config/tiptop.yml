# TiPToP Configuration for DROID setup

# == Robot connection and control ==
robot:
  type: cobot_magic
  dof: 6

  # Local end of the SSH tunnel: GPU:15555 -> upper computer controller:5555.
  # Keep host loopback unless the bridge is protected by an equivalent network boundary.
  controller_host: "127.0.0.1"
  controller_port: 15555
  request_timeout_ms: 30000
  trajectory_timeout_ms: 300000
  max_message_bytes: 134217728

  # The upper-computer backend currently controls the right arm. The GPU client
  # sends only six arm joints; ROS topics and the servo loop remain remote.
  arm: right

  # == Speed ratio for motions (0.0 to 1.0) ==
  # This corresponds to the speed of the robot
  # Start with 0.2 for safety, we DO NOT recommend going beyond 0.6 for safety
  # We use 0.6 on our setup at MIT, where we have managed the camera USB cable carefully
  time_dilation_factor: 0.2

  # Robot configurations
  q_home: [0.100704212, 0.0, -0.25243212400000004, -0.10475122, 0.639270268, 0.11178115200000001]
  q_capture: [0.054181064, 0.9935055760000001, -1.2180098560000001, 0.07541041200000001, 1.0413195800000001, -0.011146716000000001]

# == TAMP scene roles ==
# These detected objects are static obstacles: they participate in collision
# checking but are never eligible for Pick or Place actions.
environment:
  fixed_object_labels: [woven_basket, orange_box]

# == Camera configurations ==
# Supported types: zed, realsense, remote_realsense
# ZED cameras support optional resolution and fps settings:
#   HD720: 15/30/60 fps, HD1080: 15/30 fps, HD2K: 15 fps
#   If not specified, defaults to HD720 at 60 fps
# RealSense cameras only require serial and type (resolution and fps are not supported)
cameras:
  # TiPToP only uses the hand camera for perception
  hand:
    # Cobot Magic camera RPC through the local end of an SSH tunnel:
    # GPU:15556 -> upper computer camera bridge:5556.
    serial: "339222070351"
    type: remote_realsense
    camera_host: "127.0.0.1"
    camera_port: 15556
    request_timeout_ms: 30000
    max_message_bytes: 134217728

  # External camera is optional but helpful for recording execution and scene visualization script (viz-scene)
  external:
    serial: "339222070351"
    type: remote_realsense
    camera_host: "127.0.0.1"
    camera_port: 15556
    request_timeout_ms: 30000
    max_message_bytes: 134217728

# == Perception services ==
# No need to change these unless you're running them on a remote machine or changed the ports
perception:
  # OmniGround contract: multipart PNG/JPEG image, the complete prompt,
  # optional temperature. The model is selected when the OmniGround service starts.
  # The direct success body is
  # {"bboxes": [...], "predicates": [...]} (not a text/result wrapper).
  omniground:
    url: "http://localhost:8011"
    endpoint: "/generate"
    timeout_seconds: 120
    temperature: null

  foundation_stereo:
    url: "http://localhost:1234"

  m2t2:
    url: "http://localhost:8123"
    # Set to false when world coordinate frame differs from the robot base link frame
    apply_bounds: true
    # Rotation from M2T2's skeleton-gripper coordinates to Cobot Magic TCP.
    # Y is the finger opening axis; reverse X/Z to align the grasp direction.
    skeleton_to_tcp_rpy_deg: [0.0, 180.0, 0.0]
  
  sam:
    mode: "local"

  # Perception hyperparameters
  depth_trunc_m: 5.0             # Depth truncation threshold in meters
  voxel_downsample_size: 0.0075  # Point cloud downsampling in meters before feeding into M2T2
  contact_threshold_m: 0.01      # Grasp-object association distance threshold
  mask_erosion_pixels: 3         # Pixels to erode segmentation masks to reduce noise
